set:
  name: Set Timer
  description: Set a timer for an entity.
  fields:
    entity_id:
      name: Entity
      description: The entity to set the timer for.
      required: true
      selector:
        entity:
          domain: [switch, light, fan]
    duration:
      name: Duration
      description: Duration in minutes.
      required: true
      default: 0
      selector:
        number:
          min: 0
          max: 1440
          unit_of_measurement: minutes
          mode: box
