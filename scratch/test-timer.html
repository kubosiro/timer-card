<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Timer Test Lab</title>
    <style>
        :root {
            --primary-color: #03a9f4;
            --card-background: #1c1c1c;
            --text-color: #e1e1e1;
            --secondary-text: #9b9b9b;
        }
        body {
            background-color: #111;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 400px;
            padding: 20px;
        }
        /* MÔ PHỎNG CARD */
        .card {
            background: var(--card-background);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .main-info {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        .icon-box.active {
            background: rgba(3, 169, 244, 0.2);
            color: var(--primary-color);
            box-shadow: 0 0 20px rgba(3, 169, 244, 0.2);
        }
        .primary-text { font-weight: bold; font-size: 18px; }
        .secondary-text { font-size: 13px; color: var(--secondary-text); margin-top: 2px; }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .btn:active { transform: scale(0.95); }
        .btn.red { color: #ff5252; }
        .btn.blue { color: #448aff; }
        
        .presets {
            display: flex;
            gap: 8px;
        }
        .preset {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
        }

        /* LOG TEST */
        #log {
            margin-top: 30px;
            width: 100%;
            background: #000;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">⏱️ Smart Timer Test</h2>
        
        <div class="card">
            <div class="main-info">
                <div class="icon-box active" id="timer-icon">⏱️</div>
                <div class="texts">
                    <div class="primary-text" id="display-name">Smart Timer</div>
                    <div class="secondary-text" id="status-text">Đang bật · Còn 45p</div>
                </div>
            </div>

            <div class="controls">
                <div class="btn red" onclick="adjust(-30)">-30</div>
                <div class="btn red" onclick="adjust(-5)">-5</div>
                <div class="btn red" onclick="adjust(-1)">-1</div>
                <div class="btn" onclick="adjust(0)" style="font-size: 18px;">❌</div>
                <div class="btn blue" onclick="adjust(1)">+1</div>
                <div class="btn blue" onclick="adjust(5)">+5</div>
                <div class="btn blue" onclick="adjust(30)">+30</div>
                <div class="btn blue" onclick="adjust(60)">+60</div>
            </div>

            <div class="presets">
                <div class="preset" onclick="setPreset(30)">30p</div>
                <div class="preset" onclick="setPreset(60)">1h</div>
                <div class="preset" onclick="setPreset(120)">2h</div>
                <div class="preset" onclick="setPreset(240)">4h</div>
            </div>
        </div>

        <div id="log">
            <div class="log-entry">> Hệ thống đã sẵn sàng. Anh nhấn thử các nút xem sao ạ!</div>
        </div>
    </div>

    <script>
        let remaining = 45;
        let isOn = true;

        function log(msg) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            logDiv.prepend(entry);
        }

        function updateUI() {
            const statusText = document.getElementById('status-text');
            const iconBox = document.getElementById('timer-icon');
            
            if (!isOn) {
                statusText.innerText = "⛔ Đang tắt";
                iconBox.classList.remove('active');
                return;
            }

            if (remaining <= 0) {
                statusText.innerText = "✅ Đang bật · Không hẹn giờ";
                iconBox.classList.add('active');
            } else {
                statusText.innerText = `⏱️ Còn ${remaining}p · Tắt lúc ${getOffTime(remaining)}`;
                iconBox.classList.add('active');
            }
        }

        function getOffTime(mins) {
            const d = new Date();
            d.setMinutes(d.getMinutes() + mins);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function adjust(val) {
            if (val === 0) {
                remaining = 0;
                log("Đã hủy hẹn giờ.");
            } else {
                remaining = Math.max(0, remaining + val);
                log(`Đã ${val > 0 ? 'tăng' : 'giảm'} ${Math.abs(val)} phút. Tổng còn: ${remaining}p`);
            }
            updateUI();
        }

        function setPreset(val) {
            remaining = val;
            log(`Đã đặt Preset: ${val} phút.`);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
